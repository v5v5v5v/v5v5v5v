<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>花式幻境 | 沉浸式视觉体验</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* 提升视觉干净度，不影响文字选择 */
        }

        body {
            font-family: 'Segoe UI', 'Poppins', 'Inter', system-ui, -apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif;
            overflow-x: hidden;
            color: #fff;
            background: #0a0f1f; /* fallback deep color */
        }

        /* ---- Canvas 粒子背景 ---- */
        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            z-index: 0;
            pointer-events: none;  /* 让鼠标事件穿透canvas，便于与卡片交互，但粒子交互通过js监听canvas上的mousemove? 需要canvas接收事件来获得鼠标坐标，但玻璃卡片会挡住canvas, 所以canvas必须覆盖全屏且pointer-events: auto? 为了鼠标影响粒子，需要canvas接收鼠标，但又不能挡住按钮点击。解决办法：让canvas的pointer-events: auto，但按钮在更高层级且pointer-events: auto，按钮可点。canvas捕获鼠标坐标用于粒子互动，而按钮可以穿透canvas事件？实际上由于z-index顺序，canvas在底层，内容在上层，鼠标事件会被上层元素捕获，底层canvas收不到mousemove。为了粒子与鼠标互动，需要把鼠标坐标实时从document上的mousemove获取，独立更新。所以canvas的pointer-events: none完全不影响，利用全局window mousemove即可。*/
        }

        /* 主内容区 */
        .hero {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(2px); /* 轻微背景模糊，增加景深感 */
            pointer-events: auto; /* 保证内容可交互 */
        }

        /* 炫光玻璃卡片 */
        .glass-card {
            background: rgba(20, 30, 45, 0.4);
            backdrop-filter: blur(12px) saturate(180%);
            -webkit-backdrop-filter: blur(12px) saturate(180%);
            border-radius: 3rem;
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.3), 0 0 0 0.5px rgba(255, 255, 255, 0.1) inset, 0 0 30px rgba(0, 255, 255, 0.2);
            padding: 3rem 4rem;
            width: 90%;
            max-width: 700px;
            text-align: center;
            transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1), box-shadow 0.4s ease;
            animation: floatIn 1s ease-out;
        }

        .glass-card:hover {
            transform: translateY(-8px) scale(1.01);
            box-shadow: 0 35px 50px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.4) inset, 0 0 35px rgba(0, 255, 255, 0.5);
            border-color: rgba(255, 255, 255, 0.5);
        }

        /* 标题花样 */
        .fancy-title {
            font-size: 4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FFDEE9 0%, #B5FFFC 40%, #ff9a9e 80%, #fad0c4 100%);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: gradientShift 6s ease infinite, textGlow 3s ease-in-out infinite alternate;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
        }

        .title-glow {
            filter: drop-shadow(0 0 8px rgba(0,255,255,0.6));
        }

        /* 装饰性分隔符 */
        .divider {
            width: 120px;
            height: 4px;
            background: linear-gradient(90deg, transparent, #0ff, #f0f, transparent);
            margin: 1.2rem auto;
            border-radius: 4px;
            animation: pulseWidth 2s infinite alternate;
        }

        /* 子标题 */
        .sub {
            font-size: 1.2rem;
            letter-spacing: 2px;
            font-weight: 300;
            background: rgba(255,255,240,0.2);
            display: inline-block;
            padding: 0.3rem 1.2rem;
            border-radius: 60px;
            backdrop-filter: blur(4px);
            margin-bottom: 1.8rem;
            border: 1px solid rgba(255,255,255,0.3);
        }

        /* 描述文本 */
        .description {
            font-size: 1.1rem;
            line-height: 1.6;
            margin: 1.5rem 0;
            opacity: 0.9;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }

        /* 花式按钮组 */
        .btn-group {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            flex-wrap: wrap;
            margin: 2rem 0 1rem;
        }

        .fancy-btn {
            background: rgba(20, 30, 55, 0.6);
            border: 1px solid rgba(0, 255, 255, 0.5);
            padding: 0.9rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 60px;
            color: #fff;
            cursor: pointer;
            backdrop-filter: blur(8px);
            transition: all 0.3s ease;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .fancy-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0,255,255,0.4), transparent);
            transition: left 0.5s ease;
            z-index: -1;
        }

        .fancy-btn:hover {
            background: rgba(0, 200, 255, 0.2);
            border-color: #0ff;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
            transform: scale(1.05);
        }

        .fancy-btn:hover::before {
            left: 100%;
        }

        .fancy-btn:active {
            transform: scale(0.98);
        }

        /* 第二个按钮特殊颜色 */
        .btn-secondary {
            border-color: rgba(255, 0, 200, 0.6);
            box-shadow: 0 0 8px rgba(255, 0, 200, 0.3);
        }
        .btn-secondary:hover {
            border-color: #f0f;
            box-shadow: 0 0 20px rgba(255, 0, 200, 0.6);
            background: rgba(255, 0, 200, 0.15);
        }

        /* 鼠标跟随光晕（自定义光标特效） */
        .cursor-glow {
            position: fixed;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0,255,255,0.25) 0%, rgba(255,0,200,0) 70%);
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: transform 0.05s linear;
            filter: blur(30px);
            opacity: 0.7;
        }

        /* 浮动装饰粒子（css小光点，提升花哨感） */
        .floating-dots {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }
        .dot {
            position: absolute;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(0,255,200,0.6);
            animation: floatAnim 8s infinite alternate ease-in-out;
        }

        /* 页脚 */
        .footer {
            margin-top: 2.5rem;
            font-size: 0.8rem;
            opacity: 0.6;
            letter-spacing: 1px;
        }

        /* 动画定义 */
        @keyframes floatIn {
            0% {
                opacity: 0;
                transform: translateY(50px) scale(0.96);
                backdrop-filter: blur(0);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
                backdrop-filter: blur(12px);
            }
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes textGlow {
            0% { text-shadow: 0 0 2px rgba(0,255,255,0.2); }
            100% { text-shadow: 0 0 15px rgba(0,255,255,0.6); }
        }

        @keyframes pulseWidth {
            0% { width: 80px; opacity: 0.6; }
            100% { width: 160px; opacity: 1; }
        }

        @keyframes floatAnim {
            0% { transform: translateY(0px) translateX(0px) scale(1); opacity: 0.3; }
            100% { transform: translateY(-40px) translateX(20px) scale(1.2); opacity: 0.9; }
        }

        /* 响应式调整 */
        @media (max-width: 650px) {
            .glass-card {
                padding: 2rem 1.5rem;
                border-radius: 2rem;
            }
            .fancy-title {
                font-size: 2.8rem;
            }
            .btn-group {
                gap: 1rem;
            }
            .fancy-btn {
                padding: 0.6rem 1.2rem;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

    <!-- Canvas 动态粒子网络背景 -->
    <canvas id="particle-canvas"></canvas>
    
    <!-- CSS 装饰浮点（额外） -->
    <div class="floating-dots" id="floatingDots"></div>
    
    <!-- 鼠标光晕（跟随元素） -->
    <div class="cursor-glow" id="cursorGlow"></div>

    <!-- 主内容卡片 -->
    <div class="hero">
        <div class="glass-card">
            <div class="fancy-title">
                ✦ 幻境·星璇 ✦
            </div>
            <div class="divider"></div>
            <div class="sub">
                ✦ 沉浸式粒子幻界 ✦
            </div>
            <div class="description">
                跃动流光，触感涟漪 —<br>
                鼠标划过之处，星河随你舞动。每一帧都是艺术，每一瞬皆为花式。
            </div>
            <div class="btn-group">
                <button class="fancy-btn" id="magicBtn">✨ 点亮梦境 ✨</button>
                <button class="fancy-btn btn-secondary" id="rippleBtn">🌀 涟漪绽放 🌀</button>
            </div>
            <div class="footer">
                ✦ 花式粒子 · 无限引力 ✦
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ------------------------------
            // 1. 高级粒子网络背景 (带鼠标互动)
            // ------------------------------
            const canvas = document.getElementById('particle-canvas');
            const ctx = canvas.getContext('2d');
            
            let width = window.innerWidth;
            let height = window.innerHeight;
            
            // 粒子参数
            let particles = [];
            const PARTICLE_COUNT = 140;     // 粒子数量适中，保证性能且视觉效果华丽
            const CONNECTION_DIST = 140;    // 连接距离阈值
            const MOUSE_RADIUS = 150;       // 鼠标影响半径
            const REPEL_FORCE = 0.7;        // 鼠标排斥力强度
            
            let mouseX = width/2, mouseY = height/2;
            let mousePresent = false;
            
            // 鼠标移动追踪
            function handleMouseMove(e) {
                mouseX = e.clientX;
                mouseY = e.clientY;
                mousePresent = true;
                // 添加鼠标光晕动画 (直接更新位置)
                const glow = document.getElementById('cursorGlow');
                if(glow) {
                    glow.style.transform = `translate(${mouseX}px, ${mouseY}px) translate(-50%, -50%)`;
                }
            }
            
            function handleMouseLeave() {
                mousePresent = false;
                // 无需其他操作，粒子自然运动
            }
            
            window.addEventListener('mousemove', handleMouseMove);
            window.addEventListener('mouseleave', handleMouseLeave);
            
            // 粒子类
            class Particle {
                constructor(x, y, vx, vy, radius) {
                    this.x = x;
                    this.y = y;
                    this.vx = vx;
                    this.vy = vy;
                    this.radius = radius || Math.random() * 2.2 + 1.2;
                    this.color = `hsla(${Math.random() * 60 + 180}, 80%, 60%, ${Math.random() * 0.6 + 0.3})`; // 青紫色系
                }
                update() {
                    // 更新位置
                    this.x += this.vx;
                    this.y += this.vy;
                    
                    // 边缘反弹（增加动感，不完全离开视野）
                    if(this.x < 0) { this.x = 0; this.vx = -this.vx; }
                    if(this.x > width) { this.x = width; this.vx = -this.vx; }
                    if(this.y < 0) { this.y = 0; this.vy = -this.vy; }
                    if(this.y > height) { this.y = height; this.vy = -this.vy; }
                    
                    // 鼠标排斥效果 (如果鼠标在画布内)
                    if(mousePresent) {
                        const dx = this.x - mouseX;
                        const dy = this.y - mouseY;
                        const dist = Math.hypot(dx, dy);
                        if(dist < MOUSE_RADIUS && dist > 0.1) {
                            const angle = Math.atan2(dy, dx);
                            const force = (MOUSE_RADIUS - dist) / MOUSE_RADIUS * REPEL_FORCE;
                            const moveX = Math.cos(angle) * force;
                            const moveY = Math.sin(angle) * force;
                            this.vx += moveX;
                            this.vy += moveY;
                            // 限制最大速度防止飞走
                            const maxSpeed = 4.5;
                            if(Math.abs(this.vx) > maxSpeed) this.vx = this.vx > 0 ? maxSpeed : -maxSpeed;
                            if(Math.abs(this.vy) > maxSpeed) this.vy = this.vy > 0 ? maxSpeed : -maxSpeed;
                        }
                    }
                    
                    // 阻尼系数和少许随机布朗运动（增加自然花哨感）
                    this.vx *= 0.995;
                    this.vy *= 0.995;
                    // 微弱的随机摆动，让粒子活灵活现
                    if(Math.random() < 0.02) {
                        this.vx += (Math.random() - 0.5) * 0.2;
                        this.vy += (Math.random() - 0.5) * 0.2;
                    }
                }
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.shadowBlur = 8;
                    ctx.shadowColor = "rgba(0, 180, 255, 0.7)";
                    ctx.fill();
                    ctx.shadowBlur = 0; // reset
                }
            }
            
            function initParticles() {
                particles = [];
                for(let i = 0; i < PARTICLE_COUNT; i++) {
                    const x = Math.random() * width;
                    const y = Math.random() * height;
                    const vx = (Math.random() - 0.5) * 1.2;
                    const vy = (Math.random() - 0.5) * 1.2;
                    const radius = Math.random() * 2.5 + 1;
                    particles.push(new Particle(x, y, vx, vy, radius));
                }
            }
            
            // 绘制连线：根据距离和透明度，并加入动态渐变效果
            function drawLines() {
                for(let i = 0; i < particles.length; i++) {
                    for(let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const distance = Math.hypot(dx, dy);
                        if(distance < CONNECTION_DIST) {
                            // 透明度随距离变化，最远最淡
                            let alpha = (1 - distance / CONNECTION_DIST) * 0.5;
                            // 增加鼠标附近连线更亮的效果
                            if(mousePresent) {
                                const distToMouseI = Math.hypot(particles[i].x - mouseX, particles[i].y - mouseY);
                                const distToMouseJ = Math.hypot(particles[j].x - mouseX, particles[j].y - mouseY);
                                if(distToMouseI < MOUSE_RADIUS || distToMouseJ < MOUSE_RADIUS) {
                                    alpha += 0.3;
                                }
                            }
                            alpha = Math.min(alpha, 0.8);
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            // 根据粒子的颜色混合线条色
                            const gradient = ctx.createLinearGradient(particles[i].x, particles[i].y, particles[j].x, particles[j].y);
                            gradient.addColorStop(0, `rgba(100, 210, 255, ${alpha})`);
                            gradient.addColorStop(1, `rgba(210, 100, 255, ${alpha})`);
                            ctx.strokeStyle = gradient;
                            ctx.lineWidth = 1.2;
                            ctx.stroke();
                        }
                    }
                }
            }
            
            // 额外绘制鼠标周围的光环效果（在canvas中叠加辉光，增强视觉）
            function drawMouseGlowOnCanvas() {
                if(mousePresent) {
                    ctx.beginPath();
                    ctx.arc(mouseX, mouseY, MOUSE_RADIUS * 0.6, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(0, 255, 200, 0.06)';
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(mouseX, mouseY, MOUSE_RADIUS * 0.3, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(255, 100, 200, 0.1)';
                    ctx.fill();
                }
            }
            
            // 动画循环
            function animate() {
                if(!ctx) return;
                ctx.clearRect(0, 0, width, height);
                // 增加深邃星空背景：半透明径向渐变，保留之前的拖尾粒子感
                const grad = ctx.createLinearGradient(0, 0, width*0.8, height);
                grad.addColorStop(0, '#0a0f2a');
                grad.addColorStop(1, '#10162e');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, width, height);
                // 绘制星星点点(细微的繁星)
                ctx.fillStyle = 'rgba(255,255,200,0.6)';
                for(let i = 0; i < 100; i++) { // 额外随机繁星
                    if(i%2 === 0) continue; // 性能优化
                    ctx.beginPath();
                    ctx.arc( (i*131)%width, (i*253)%height, 1, 0, Math.PI*2);
                    ctx.fill();
                }
                
                // 更新所有粒子位置
                for(let p of particles) {
                    p.update();
                    p.draw();
                }
                // 绘制连线
                drawLines();
                // 绘制鼠标影响区域幻光
                drawMouseGlowOnCanvas();
                
                requestAnimationFrame(animate);
            }
            
            function resizeCanvas() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
                initParticles();  // 重置粒子适应新尺寸
            }
            
            // 初始化canvas
            canvas.style.position = 'fixed';
            canvas.style.top = 0;
            canvas.style.left = 0;
            canvas.style.width = '100%';
            canvas.style.height = '100%';
            canvas.style.zIndex = '0';
            canvas.style.pointerEvents = 'none'; // 让鼠标事件穿透canvas到下层内容，同时鼠标位置全局追踪已经实现
            resizeCanvas();
            window.addEventListener('resize', () => {
                resizeCanvas();
            });
            
            animate();
            
            // ------------------------------
            // 2. 生成浮动小光点（CSS装饰）
            // ------------------------------
            function createFloatingDots() {
                const container = document.getElementById('floatingDots');
                if(!container) return;
                const dotCount = 35;
                for(let i = 0; i < dotCount; i++) {
                    const dot = document.createElement('div');
                    dot.classList.add('dot');
                    const size = Math.random() * 6 + 2;
                    dot.style.width = `${size}px`;
                    dot.style.height = `${size}px`;
                    dot.style.left = `${Math.random() * 100}%`;
                    dot.style.top = `${Math.random() * 100}%`;
                    dot.style.animationDelay = `${Math.random() * 5}s`;
                    dot.style.animationDuration = `${Math.random() * 6 + 5}s`;
                    dot.style.background = `radial-gradient(circle, rgba(0,255,200,0.7), rgba(255,100,200,0.4))`;
                    container.appendChild(dot);
                }
            }
            createFloatingDots();
            
            // ------------------------------
            // 3. 交互按钮特效（花式反馈 + 粒子波纹）
            // ------------------------------
            const magicBtn = document.getElementById('magicBtn');
            const rippleBtn = document.getElementById('rippleBtn');
            
            // 工具：动态创建临时波纹样式
            function createRippleEffect(x, y, color = 'cyan') {
                const ripple = document.createElement('div');
                ripple.style.position = 'fixed';
                ripple.style.left = `${x}px`;
                ripple.style.top = `${y}px`;
                ripple.style.width = '0px';
                ripple.style.height = '0px';
                ripple.style.borderRadius = '50%';
                ripple.style.backgroundColor = color === 'cyan' ? 'rgba(0, 255, 255, 0.5)' : 'rgba(255, 0, 200, 0.5)';
                ripple.style.transform = 'translate(-50%, -50%)';
                ripple.style.zIndex = '9999';
                ripple.style.pointerEvents = 'none';
                ripple.style.transition = 'all 0.6s ease-out';
                document.body.appendChild(ripple);
                requestAnimationFrame(() => {
                    ripple.style.width = '200px';
                    ripple.style.height = '200px';
                    ripple.style.opacity = '0';
                });
                setTimeout(() => {
                    ripple.remove();
                }, 600);
            }
            
            // 随机粒子冲击（额外视觉效果：在按钮点击时在按钮位置爆发粒子光效）
            function burstParticlesAround(x, y) {
                for(let i = 0; i < 18; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Math.random() * 3 + 1;
                    const vx = Math.cos(angle) * speed;
                    const vy = Math.sin(angle) * speed;
                    const newP = new Particle(x, y, vx, vy, Math.random() * 2 + 1);
                    // 颜色花哨
                    newP.color = `hsla(${Math.random() * 360}, 85%, 65%, 0.9)`;
                    particles.push(newP);
                    // 限制粒子数组不要无限增长，但为了性能，设置临时移除生命周期
                    setTimeout(() => {
                        const idx = particles.indexOf(newP);
                        if(idx !== -1) particles.splice(idx, 1);
                    }, 2000);
                }
            }
            
            magicBtn.addEventListener('click', (e) => {
                const rect = magicBtn.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                createRippleEffect(centerX, centerY, 'cyan');
                burstParticlesAround(centerX, centerY);
                // 临时高亮所有粒子连线增加绚丽感
                for(let p of particles) {
                    p.color = `hsl(${Math.random() * 60 + 180}, 85%, 65%)`;
                    setTimeout(() => {
                        // 渐变恢复不强行全改，以免过于频繁
                    }, 500);
                }
                // 动态闪一下卡片边框
                const card = document.querySelector('.glass-card');
                if(card) {
                    card.style.transition = 'box-shadow 0.2s';
                    card.style.boxShadow = '0 0 30px cyan, 0 0 15px magenta';
                    setTimeout(() => {
                        card.style.boxShadow = '';
                    }, 300);
                }
                // 弹窗提示 但不是普通alert，用甜点提示（悬浮文本更好）
                showFancyToast('✨ 星璇绽放，梦境扩散 ✨');
            });
            
            rippleBtn.addEventListener('click', (e) => {
                const rect = rippleBtn.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                createRippleEffect(centerX, centerY, 'magenta');
                // 产生更多粒子流向外扩散
                for(let i = 0; i < 30; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Math.random() * 3.5;
                    const vx = Math.cos(angle) * speed;
                    const vy = Math.sin(angle) * speed;
                    const newP = new Particle(centerX, centerY, vx, vy, Math.random() * 2.5);
                    newP.color = `hsl(${Math.random() * 80 + 280}, 80%, 65%)`; // 紫红幻彩
                    particles.push(newP);
                    setTimeout(() => {
                        const idx = particles.indexOf(newP);
                        if(idx !== -1) particles.splice(idx, 1);
                    }, 1800);
                }
                showFancyToast('🌀 涟漪四起，时空荡漾 🌀');
            });
            
            // 优雅的浮动toast提示
            function showFancyToast(msg) {
                const toast = document.createElement('div');
                toast.innerText = msg;
                toast.style.position = 'fixed';
                toast.style.bottom = '30px';
                toast.style.left = '50%';
                toast.style.transform = 'translateX(-50%)';
                toast.style.backgroundColor = 'rgba(0,0,0,0.7)';
                toast.style.backdropFilter = 'blur(12px)';
                toast.style.border = '1px solid cyan';
                toast.style.borderRadius = '40px';
                toast.style.padding = '8px 24px';
                toast.style.fontWeight = '500';
                toast.style.color = '#fff';
                toast.style.zIndex = '10000';
                toast.style.fontSize = '0.9rem';
                toast.style.letterSpacing = '1px';
                toast.style.boxShadow = '0 0 20px rgba(0,255,255,0.3)';
                toast.style.whiteSpace = 'nowrap';
                document.body.appendChild(toast);
                setTimeout(() => {
                    toast.style.opacity = '0';
                    toast.style.transition = 'opacity 0.4s';
                    setTimeout(() => toast.remove(), 500);
                }, 1800);
            }
            
            // 鼠标光晕预置移动同时初始化位置
            const glowCursor = document.getElementById('cursorGlow');
            if(glowCursor) {
                glowCursor.style.transition = 'transform 0.03s linear';
            }
            
            // 加一些小彩蛋: 每隔10秒随机改变粒子整体色调 (微妙变化)
            let hueOffset = 0;
            setInterval(() => {
                hueOffset = (hueOffset + 15) % 360;
                for(let p of particles) {
                    // 随机微调部分粒子颜色，营造渐变氛围
                    if(Math.random() < 0.3) {
                        p.color = `hsla(${(parseInt(p.color.match(/\d+/)?.[0] || 200) + 5) % 360}, 75%, 60%, 0.7)`;
                    }
                }
            }, 4000);
            
            // 初始化展示第一次特效
            setTimeout(() => {
                showFancyToast('✨ 欢迎进入花式幻界 · 移动鼠标与粒子共舞 ✨');
            }, 500);
        })();
    </script>
</body>
</html>
